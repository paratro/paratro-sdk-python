name: Release

on:
  push:
    branches: [main]
    paths:
      - "paratro/version.py"

jobs:
  release:
    name: Build, Publish & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine requests

      - name: Run tests
        run: |
          pip install pytest
          pip install -e .
          python -m pytest tests/ -v

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'VERSION' paratro/version.py | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: ${VERSION}"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag v${{ steps.version.outputs.version }} already exists, skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build package
        if: steps.check_tag.outputs.exists == 'false'
        run: python -m build

      - name: Publish to PyPI
        if: steps.check_tag.outputs.exists == 'false'
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create GitHub Release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: |
            ## Paratro Python SDK ${{ steps.version.outputs.tag }}

            ### Installation

            ```bash
            pip install paratro-sdk==${{ steps.version.outputs.version }}
            ```

            ### Links

            - [PyPI](https://pypi.org/project/paratro-sdk/${{ steps.version.outputs.version }}/)
            - [Documentation](https://docs.paratro.com)

            ### Changes

            ${{ github.event.head_commit.message }}
          draft: false
          prerelease: false
